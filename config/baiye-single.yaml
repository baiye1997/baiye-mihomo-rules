# ============================================================
# Baiye Mihomo 普通版：电脑 / 主力设备 / 规则完整
# 适合：Windows / macOS / Android 高级客户端
# 特点：完整分流、AI/流媒体/微软/苹果/Telegram 独立策略组
# ============================================================

url: &url "http://www.gstatic.com/generate_204"
blk: &blk '^(?!.*(?i)(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)).*$'
prov: &prov {type: http, interval: 86400, health-check: {enable: true, url: *url, interval: 300}}

# ======================= 只改这里：订阅 =======================
proxy-providers:
  Node:
    <<: *prov
    url: "替换订阅链接"
    path: "./proxy_provider/providers.yaml"
    filter: *blk

# ======================= 基础配置 =======================
mixed-port: 7890
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: off

external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-name: zashboard
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
# secret: "请自行设置强密码"

keep-alive-idle: 600
keep-alive-interval: 60

profile:
  store-selected: true
  store-fake-ip: true

# ======================= DNS =======================
dns:
  enable: true
  prefer-h3: false
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  nameserver-policy:
    "geosite:cn":
      - 223.5.5.5
      - 119.29.29.29
    "geosite:private":
      - 223.5.5.5
      - 119.29.29.29
  fake-ip-filter:
    - rule-set:fake-ip
    - geosite:cn
    - geosite:private
    - geosite:connectivity-check
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.home.arpa"
    - "localhost.ptlogin2.qq.com"
    - "+.miwifi.com"
    - "+.mijia.tech"
    - "+.miot-spec.org"
    - "+.push.apple.com"
    - "+.market.xiaomi.com"
    - "+.srv.nintendo.net"
    - "stun.*"
    - "*.stun.*"
    - "*.xboxlive.com"

# ======================= 嗅探 =======================
sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS:  {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  skip-domain:
    - rule-set:sniff-skip
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.miwifi.com"
    - "+.mijia.tech"
    - "+.miot-spec.org"

# ======================= TUN：默认关闭，电脑需要全局接管再开 =======================
tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
  mtu: 1500

# ======================= Geodata =======================
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"

# ======================= 策略组锚点 =======================
tmpl: &tmpl {url: *url, interval: 300, lazy: true, timeout: 5000, disable-udp: false, max-failed-times: 3, hidden: true, include-all-providers: true, exclude-filter: "(?i)(DIRECT|直接连接|官网|订阅|流量|到期|套餐|客服|群|邀请|网址|剩余|过期|LAN)"}
sel:  &sel  {type: select, url: *url, disable-udp: false, hidden: false, include-all-providers: true, exclude-filter: "(?i)(DIRECT|直接连接|官网|订阅|流量|到期|套餐|客服|群|邀请|网址|剩余|过期|LAN)"}
test: &test {type: url-test, <<: *tmpl, tolerance: 50}
fall: &fall {type: fallback, <<: *tmpl}

entr: &entr {type: select, proxies: ["♻️ 智能选择","👆 手动选择","DIRECT"]}
app:  &app  {type: select, proxies: ["♻️ 智能选择","👆 手动选择","DIRECT","🇭🇰 - 择优节点","🇹🇼 - 择优节点","🇯🇵 - 择优节点","🇰🇷 - 择优节点","🇸🇬 - 择优节点","🇺🇸 - 择优节点"]}
drc:  &drc  {type: select, proxies: ["DIRECT","♻️ 智能选择","👆 手动选择","🇭🇰 - 择优节点","🇹🇼 - 择优节点","🇯🇵 - 择优节点","🇸🇬 - 择优节点","🇺🇸 - 择优节点"]}
strm: &strm {type: select, proxies: ["♻️ 智能选择","👆 手动选择","DIRECT","🇭🇰 - 择优节点","🇹🇼 - 择优节点","🇯🇵 - 择优节点","🇰🇷 - 择优节点","🇸🇬 - 择优节点","🇺🇸 - 择优节点","🇭🇰 - 自动回退","🇹🇼 - 自动回退","🇯🇵 - 自动回退","🇸🇬 - 自动回退","🇺🇸 - 自动回退"]}
tg:   &tg   {type: select, proxies: ["♻️ 智能选择","👆 手动选择","DIRECT","🇸🇬 - 择优节点","🇭🇰 - 择优节点","🇯🇵 - 择优节点","🇺🇸 - 择优节点"]}

hk: &hk '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(?i)(5x)).*$'
tw: &tw '^(?=.*(?i)(台|台湾|臺|🇹🇼|TW|Taiwan|Taipei|TPE|TSA|KHH))(?!.*(?i)(5x)).*$'
jp: &jp '^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(?i)(尼日利亚|5x)).*$'
kr: &kr '^(?=.*(?i)(韩|🇰🇷|韓|首尔|南朝鲜|KR|KOR|Korea|South))(?!.*(?i)(5x)).*$'
sg: &sg '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(?i)(5x)).*$'
us: &us '^(?=.*(?i)(美|🇺🇸|US|USA|United States|JFK|SJC|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(?i)(Australia|5x)).*$'

# ======================= 策略组 =======================
proxy-groups:
